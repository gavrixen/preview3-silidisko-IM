/* ── Status config ───────────────────────────────────── */
const statusConfig = {
    available: { label: "Available" },
    reserved:  { label: "Reserved"  },
    occupied:  { label: "Occupied"  }
};

/* ── Date heading (always current date) ──────────────── */
(function setDateHeading() {
    const now    = new Date();
    const days   = ["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];
    const months = ["January","February","March","April","May","June","July","August","September","October","November","December"];
    document.getElementById("date-heading").textContent =
        `${days[now.getDay()]}, ${months[now.getMonth()]} ${now.getDate()} \u2013 All Rooms`;
})();

/* ── Render cards (no icon wrap) ─────────────────────── */
(function renderCards() {
    const list = document.getElementById("sched-list");

    scheduleData.forEach((entry, index) => {
        const cfg = statusConfig[entry.status] || statusConfig.available;
        const timeParts = entry.time.match(/^(\d{1,2}:\d{2})\s*(AM|PM)$/i);
        const hhmm = timeParts ? timeParts[1] : entry.time;
        const ampm = timeParts ? timeParts[2].toUpperCase() : "";

        const card = document.createElement("div");
        card.className = `sched-card ${entry.status}`;
        card.dataset.index = index;

        card.innerHTML = `
            <div class="sched-time">
                <span class="time-hhmm">${hhmm}</span>
                <span class="time-ampm">${ampm}</span>
            </div>
            <div class="sched-body">
                <div class="sched-title">${entry.title}</div>
                <div class="sched-details">${entry.details}</div>
            </div>
            <span class="sched-status-label">${cfg.label}</span>
        `;

        card.addEventListener("click", () => openModal(index));
        list.appendChild(card);
    });
})();

/* ── Modal logic ─────────────────────────────────────── */
const overlay   = document.getElementById("modal-overlay");
const sheet     = document.getElementById("modal-sheet");
const content   = document.getElementById("modal-content");
const closeBtn  = document.getElementById("modal-close-btn");

function openModal(index) {
    const entry = scheduleData[index];
    const cfg   = statusConfig[entry.status] || statusConfig.available;

    const timeParts = entry.time.match(/^(\d{1,2}:\d{2})\s*(AM|PM)$/i);
    const hhmm = timeParts ? timeParts[1] : entry.time;
    const ampm = timeParts ? timeParts[2].toUpperCase() : "";

    // Build header band
    let html = `
        <div class="modal-header-band ${entry.status}">
            <div class="modal-band-time">
                <span class="mbt-hhmm">${hhmm}</span>
                <span class="mbt-ampm">${ampm}</span>
            </div>
            <div class="modal-band-text">
                <div class="modal-band-title">${entry.title}</div>
                <div class="modal-band-subtitle">${entry.details}</div>
                <span class="modal-status-pill">${cfg.label}</span>
            </div>
        </div>
    `;

    // Build room detail blocks
    if (entry.rooms && entry.rooms.length > 0) {
        const sectionLabel = entry.rooms.length > 1 ? "Room Breakdown" : "Room Details";
        html += `<div class="modal-section-label">${sectionLabel}</div>`;

        entry.rooms.forEach(r => {
            html += `
                <div class="modal-room-block">
                    <div class="modal-room-header">
                        <span class="modal-room-name">${r.room}</span>
                        <span class="modal-room-type">${r.type}</span>
                    </div>
                    <div class="modal-row">
                        <span class="modal-row-label">Professor</span>
                        <span class="modal-row-value">${r.professor}</span>
                    </div>
                    <div class="modal-row">
                        <span class="modal-row-label">Course</span>
                        <span class="modal-row-value">${r.course} &middot; ${r.year}</span>
                    </div>
                    <div class="modal-row">
                        <span class="modal-row-label">Section</span>
                        <span class="modal-row-value">${r.section}</span>
                    </div>
                    <div class="modal-row">
                        <span class="modal-row-label">Time</span>
                        <span class="modal-row-value">${r.startTime} &ndash; ${r.endTime}</span>
                    </div>
                    <div class="modal-row">
                        <span class="modal-row-label">Purpose</span>
                        <span class="modal-row-value">${r.purpose}</span>
                    </div>
                </div>
            `;
        });
    } else {
        // Available / free period — no room records
        html += `
            <div class="modal-section-label">Room Details</div>
            <div class="modal-note-block">No active reservations during this period.<br>All rooms are free.</div>
        `;
    }

    content.innerHTML = html;

    // Scroll sheet to top each time
    sheet.scrollTop = 0;

    overlay.classList.add("open");
    sheet.classList.add("open");
    document.body.style.overflow = "hidden";
}

function closeModal() {
    overlay.classList.remove("open");
    sheet.classList.remove("open");
    document.body.style.overflow = "";
}

/* ══════════════════════════════════════════════════════
   MENU MODAL + LOGOUT MODAL LOGIC
   Copy this script block to other pages as needed.
   ══════════════════════════════════════════════════════ */

/* ── Menu modal ──────────────────────────────────────── */
(function initMenuModal() {
    const menuBtn        = document.querySelector(".menu-btn");
    const menuOverlay    = document.getElementById("menu-modal-overlay");
    const menuSheet      = document.getElementById("menu-modal-sheet");
    const logoutTrigger  = document.getElementById("menu-modal-logout-btn");

    function openMenuModal() {
        menuOverlay.classList.add("open");
        menuSheet.classList.add("open");
        document.body.style.overflow = "hidden";
    }
    function closeMenuModal() {
        menuOverlay.classList.remove("open");
        menuSheet.classList.remove("open");
        document.body.style.overflow = "";
    }

    menuBtn.addEventListener("click", openMenuModal);
    menuOverlay.addEventListener("click", closeMenuModal);

    /* "Log out" inside menu triggers the confirm-logout modal */
    logoutTrigger.addEventListener("click", function () {
        closeMenuModal();
        /* Small delay so menu sheet finishes sliding down before logout sheet slides up */
        setTimeout(openLogoutModal, 180);
    });
})();

/* ── Logout confirm modal ────────────────────────────── */
function openLogoutModal() {
    const logoutOverlay = document.getElementById("logout-modal-overlay");
    const logoutSheet   = document.getElementById("logout-modal-sheet");
    logoutOverlay.classList.add("open");
    logoutSheet.classList.add("open");
    document.body.style.overflow = "hidden";
}

(function initLogoutModal() {
    const logoutOverlay = document.getElementById("logout-modal-overlay");
    const logoutSheet   = document.getElementById("logout-modal-sheet");
    const cancelBtn     = document.getElementById("logout-modal-cancel-btn");

    function closeLogoutModal() {
        logoutOverlay.classList.remove("open");
        logoutSheet.classList.remove("open");
        document.body.style.overflow = "";
    }

    cancelBtn.addEventListener("click", closeLogoutModal);
    logoutOverlay.addEventListener("click", closeLogoutModal);
})();

closeBtn.addEventListener("click", closeModal);
overlay.addEventListener("click", closeModal);

</script>
