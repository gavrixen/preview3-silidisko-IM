<!DOCTYPE html>

<head>

<body>

    <!-- ── SITE HEADER ─────────────────────────────── -->
        <header class="site-header">
        <div class="header-top">
            <div class="brand">
                <div class="brand-icon">
                    <iconify-icon icon="pinhead:room" width="18" height="18"></iconify-icon>
                </div>
                <span class="brand-name">Silid Isko</span>
            </div>
            <button class="menu-btn" aria-label="Menu">
                <span></span><span></span><span></span>
            </button>
        </div>
        <a href="index.html" class="back-link">&#8249; Back to homepage</a>

        <div class="page-title">
            <div class="page-title-icon">
                <iconify-icon icon="mingcute:history-fill" width="22" height="22"></iconify-icon>
            </div>
            <div>
                <h1>Activity<br>Logs</h1>
            </div>
        </div>
    </header>

    <!-- ── MODAL 1: HEADER MENU MODAL ────────────────
         Copy this block to other pages as needed.
         ──────────────────────────────────────────────── -->
    <div class="gm-overlay" id="menu-modal-overlay"></div>
    <div class="gm-sheet menu-modal-sheet" id="menu-modal-sheet" role="dialog" aria-modal="true" aria-label="Menu">
        <div class="gm-handle"></div>
        <ul class="menu-modal-nav">
            <li><a href="#">USER PROFILE</a></li>
            <li><a href="#">ABOUT US</a></li>
            <li><a href="#">CONTACT US</a></li>
        </ul>
        <div class="menu-modal-footer">
            <button class="menu-modal-logout-btn" id="menu-modal-logout-btn">Log out</button>
        </div>
    </div>

    <!-- ── MODAL 2: CONFIRM LOGOUT MODAL ──────────────
         Copy this block to other pages as needed.
         ──────────────────────────────────────────────── -->
    <div class="gm-overlay" id="logout-modal-overlay"></div>
    <div class="gm-sheet logout-modal-sheet" id="logout-modal-sheet" role="dialog" aria-modal="true" aria-label="Confirm logout">
        <div class="gm-handle"></div>
        <div class="logout-modal-hero">
            <div class="logout-modal-hero-icon">
                <svg xmlns="http://www.w3.org/2000/svg" width="1em" height="1em" viewBox="0 0 24 24"><use href="#solar--exit-bold" /></svg>
            </div>
            <div class="logout-modal-hero-title">Logging out?</div>
        </div>
        <p class="logout-modal-subtext">Are you sure you want to end your session and return to the main landing page?</p>
        <div class="logout-modal-actions">
            <button class="logout-modal-cancel-btn" id="logout-modal-cancel-btn">Cancel</button>
            <a href="#" class="logout-modal-confirm-btn">Log out</a>
        </div>
    </div>

    <!-- ── MAIN SCROLL AREA ────────────────────────── -->
    <main class="logs-scroll">
        <div class="log-list" id="log-list">
            <!-- Cards generated by JS -->
        </div>
    </main>

    <!-- ── BOTTOM NAVIGATION BAR ───────────────────── -->
    <nav class="bottom-nav">
        <a href="scheds.html" class="nav-item" aria-label="Schedules">
            <iconify-icon icon="typcn:calendar" width="24" height="24"></iconify-icon>

        <a href="reserve.html" class="nav-item" aria-label="Reservation">
            <iconify-icon icon="fluent:note-add-16-filled" width="24" height="24"></iconify-icon>
        </a>
        <a href="checkin.html" class="nav-item" aria-label="QR Check-in">
            <iconify-icon icon="ion:qr-code" width="24" height="24"></iconify-icon>
        </a>
        <a href="#" class="nav-item active" aria-label="History & Logs">
            <iconify-icon icon="mingcute:history-fill" width="24" height="24"></iconify-icon>
        </a>
        <a href="avail.html" class="nav-item" aria-label="Room Availability">
            <iconify-icon icon="material-symbols:map" width="24" height="24"></iconify-icon>
        </a>
    </nav>

<!-- ════════════════════════════════════════════════════
     END OF HTML — JAVASCRIPT BEGINS BELOW
     ════════════════════════════════════════════════════ -->
<script>

// TODO: Replace this hardcoded array with a fetch() call to the backend API
// when it is ready. Filter results server-side by the logged-in user's ID.
// Join the `reservation` and `attendance_log` tables, sorted by confirmed_at DESC.
const historyData = [
    {
        action:  "Room Reserved",
        room:    "RM 303",
        detail:  "Prof. Santos | DIT 2-1",
        date:    "June 8, 2026",
        time:    "09:00 AM",
        status:  "reserved"
    },
    {
        action:  "Checked In",
        room:    "RM 303",
        detail:  "Prof. Santos | DIT 2-1",
        date:    "June 8, 2026",
        time:    "10:05 AM",
        status:  "occupied"
    },
    {
        action:  "Reservation Cancelled",
        room:    "RM 304",
        detail:  "Prof. Cruz | DIT 1-6",
        date:    "June 7, 2026",
        time:    "02:00 PM",
        status:  "cancelled"
    },
    {
        action:  "Room Reserved",
        room:    "AVR",
        detail:  "Prof. Alvarez | DIT 2-2",
        date:    "June 6, 2026",
        time:    "07:00 PM",
        status:  "reserved"
    },
    {
        action:  "Checked In",
        room:    "AVR",
        detail:  "Prof. Alvarez | DIT 2-2",
        date:    "June 6, 2026",
        time:    "07:12 PM",
        status:  "occupied"
    }
];

/* ── Status config ───────────────────────────────────── */
const statusConfig = {
    reserved:  { icon: "fluent:note-add-16-filled", label: "Reserved"   },
    occupied:  { icon: "mingcute:door-fill",         label: "Checked In" },
    cancelled: { icon: "mingcute:close-fill",        label: "Cancelled"  }
};

/* ── Render log cards ────────────────────────────────── */
(function renderLogs() {
    const list = document.getElementById("log-list");

    if (!historyData || historyData.length === 0) {
        list.innerHTML = `<div class="log-empty">No activity logged yet.</div>`;
        return;
    }

    historyData.forEach(entry => {
        const cfg = statusConfig[entry.status] || statusConfig.reserved;

        const card = document.createElement("div");
        card.className = `log-card ${entry.status}`;

        card.innerHTML = `
            <div class="log-icon-wrap">
                <iconify-icon icon="${cfg.icon}" width="22"></iconify-icon>
            </div>
            <div class="log-body">
                <div class="log-action">${entry.action}</div>
                <div class="log-room">${entry.room}</div>
                <div class="log-detail">${entry.detail}</div>
            </div>
            <div class="log-datetime">
                <span class="log-date">${entry.date}</span>
                <span class="log-time">${entry.time}</span>
            </div>
            <span class="log-status-label">${cfg.label}</span>
        `;

        list.appendChild(card);
    });
})();

/* ══════════════════════════════════════════════════════
   MENU MODAL + LOGOUT MODAL LOGIC
   Copy this script block to other pages as needed.
   ══════════════════════════════════════════════════════ */

/* ── Menu modal ──────────────────────────────────────── */
(function initMenuModal() {
    const menuBtn        = document.querySelector(".menu-btn");
    const menuOverlay    = document.getElementById("menu-modal-overlay");
    const menuSheet      = document.getElementById("menu-modal-sheet");
    const logoutTrigger  = document.getElementById("menu-modal-logout-btn");

    function openMenuModal() {
        menuOverlay.classList.add("open");
        menuSheet.classList.add("open");
        document.body.style.overflow = "hidden";
    }
    function closeMenuModal() {
        menuOverlay.classList.remove("open");
        menuSheet.classList.remove("open");
        document.body.style.overflow = "";
    }

    menuBtn.addEventListener("click", openMenuModal);
    menuOverlay.addEventListener("click", closeMenuModal);

    /* "Log out" inside menu triggers the confirm-logout modal */
    logoutTrigger.addEventListener("click", function () {
        closeMenuModal();
        /* Small delay so menu sheet finishes sliding down before logout sheet slides up */
        setTimeout(openLogoutModal, 180);
    });
})();

/* ── Logout confirm modal ────────────────────────────── */
function openLogoutModal() {
    const logoutOverlay = document.getElementById("logout-modal-overlay");
    const logoutSheet   = document.getElementById("logout-modal-sheet");
    logoutOverlay.classList.add("open");
    logoutSheet.classList.add("open");
    document.body.style.overflow = "hidden";
}

(function initLogoutModal() {
    const logoutOverlay = document.getElementById("logout-modal-overlay");
    const logoutSheet   = document.getElementById("logout-modal-sheet");
    const cancelBtn     = document.getElementById("logout-modal-cancel-btn");

    function closeLogoutModal() {
        logoutOverlay.classList.remove("open");
        logoutSheet.classList.remove("open");
        document.body.style.overflow = "";
    }

    cancelBtn.addEventListener("click", closeLogoutModal);
    logoutOverlay.addEventListener("click", closeLogoutModal);
})();

</script>
</body>
</html>
